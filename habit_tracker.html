<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<style>

body{
font-family:-apple-system;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.tracker{
display:grid;
grid-template-columns:120px repeat(7,1fr);
gap:8px;
align-items:start;
}

.day-label{
text-align:center;
font-weight:bold;
padding:4px;
border-radius:6px;
}

.today-label{
background:white;
}

.habit-name{
font-size:14px;
margin-top:8px;
}

.day-column{
background:#ddd;
border-radius:20px;
padding:10px 0;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
min-height:180px;
}

.day-column.today{
border:3px solid black;
}

.day-column.done{
background:black;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
border:2px solid black;
cursor:pointer;
}

.dot.done{
background:black;
}

.day-column.done .dot{
border:2px solid white;
}

.day-column.done .dot.done{
background:white;
}

</style>
</head>

<body>

<h1>Habit Tracker</h1>

<div id="tracker" class="tracker"></div>

<script>

const habits=[
"穿衣服",
"上厕所",
"烧水",
"刷牙"
]

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]

const today=(new Date().getDay()+6)%7


function getWeekKey(){
const now=new Date()
const start=new Date(now.getFullYear(),0,1)
const diff=(now-start)/86400000
return Math.floor((diff+start.getDay()+1)/7)
}


let store=JSON.parse(localStorage.getItem("habitStore"))||{
week:null,
data:{}
}


const currentWeek=getWeekKey()

if(store.week!==currentWeek){
store.week=currentWeek
store.data={}
localStorage.setItem("habitStore",JSON.stringify(store))
}

let data=store.data


function save(){
store.data=data
localStorage.setItem("habitStore",JSON.stringify(store))
}


function render(){

const tracker=document.getElementById("tracker")
tracker.innerHTML=""

tracker.appendChild(document.createElement("div"))

days.forEach((d,i)=>{

const label=document.createElement("div")
label.className="day-label"
label.innerText=d

if(i===today) label.classList.add("today-label")

tracker.appendChild(label)

})

habits.forEach((habit,hIndex)=>{

const name=document.createElement("div")
name.className="habit-name"
name.innerText=habit
tracker.appendChild(name)

days.forEach((d,dayIndex)=>{

let column=document.querySelector(`#col-${dayIndex}`)

if(!column){

column=document.createElement("div")
column.className="day-column"
column.id=`col-${dayIndex}`

if(dayIndex===today){
column.classList.add("today")
}

tracker.appendChild(column)

}

const dot=document.createElement("div")
dot.className="dot"

const key=`${dayIndex}-${hIndex}`

if(data[key]){
dot.classList.add("done")
}

dot.onclick=()=>{

data[key]=!data[key]

save()
render()

}

column.appendChild(dot)

})

})


days.forEach((d,dayIndex)=>{

let complete=true

for(let h=0;h<habits.length;h++){

if(!data[`${dayIndex}-${h}`]){
complete=false
break
}

}

const col=document.getElementById(`col-${dayIndex}`)

if(complete){
col.classList.add("done")
}

})

}

render()

</script>

</body>
</html>
