<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<style>

body{
font-family:-apple-system;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.container{
display:flex;
gap:16px;
}

/* 左侧习惯列 */

.habit-column{
width:150px;
}

.section-title{
margin-top:20px;
font-weight:bold;
border-bottom:2px solid #aaa;
padding-bottom:4px;
}

.habit{
height:34px;
display:flex;
align-items:center;
font-size:14px;
}

/* 星期列 */

.days{
display:flex;
gap:10px;
}

.day{
background:#ddd;
border-radius:22px;
padding:10px 0;
width:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.day.today{
border:3px solid black;
}

.day.done{
background:black;
}

.day-label{
margin-bottom:10px;
padding:3px 10px;
border-radius:10px;
font-weight:bold;
}

/* .today .day-label{
background:white;
}

.day.done .day-label{
background:white;
} */

/* 圆点 */

.dot{
width:14px;
height:14px;
border-radius:50%;
border:2px solid black;
margin:9px 0;
cursor:pointer;
}

.dot.done{
background:black;
}

.day.done .dot{
border:2px solid black;
}

.day.done .dot.done{
background:black;
}

</style>
</head>

<body>

<h1>Habit Tracker</h1>

<div class="container">

<div id="habits" class="habit-column"></div>

<div id="days" class="days"></div>

</div>

<script>

/* 习惯结构 */

const sections=[
{
title:"起床后",
habits:[
"穿衣服",
"上厕所",
"刷牙",
"洗脸",
"梳头"
]
},
{
title:"早餐后",
habits:[
"洗内裤",
"消毒内裤",
"收衣服",
"叠衣服"
]
}
]

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]

const today=(new Date().getDay()+6)%7

/* 扁平化 habit 索引 */

let habitList=[]
sections.forEach(s=>{
s.habits.forEach(h=>{
habitList.push(h)
})
})

/* 周检测 */

function weekKey(){
const now=new Date()
const start=new Date(now.getFullYear(),0,1)
const diff=(now-start)/86400000
return Math.floor((diff+start.getDay()+1)/7)
}

let store=JSON.parse(localStorage.getItem("habitData"))||{
week:null,
data:{}
}

if(store.week!==weekKey()){
store.week=weekKey()
store.data={}
}

let data=store.data

function save(){
localStorage.setItem("habitData",JSON.stringify(store))
}

/* 渲染 */

function render(){

/* 左列 */

const habitCol=document.getElementById("habits")
habitCol.innerHTML=""

sections.forEach(section=>{

const title=document.createElement("div")
title.className="section-title"
title.innerText=section.title
habitCol.appendChild(title)

section.habits.forEach(h=>{

const div=document.createElement("div")
div.className="habit"
div.innerText=h
habitCol.appendChild(div)

})

})

/* 星期列 */

const daysDiv=document.getElementById("days")
daysDiv.innerHTML=""

days.forEach((d,dayIndex)=>{

const day=document.createElement("div")
day.className="day"

if(dayIndex===today){
day.classList.add("today")
}

const label=document.createElement("div")
label.className="day-label"
label.innerText=d

day.appendChild(label)

habitList.forEach((h,hIndex)=>{

const dot=document.createElement("div")
dot.className="dot"

const key=`${dayIndex}-${hIndex}`

if(data[key]){
dot.classList.add("done")
}

dot.onclick=()=>{

data[key]=!data[key]
save()
render()

}

day.appendChild(dot)

})

/* 检查整列 */

let complete=true

habitList.forEach((h,hIndex)=>{
if(!data[`${dayIndex}-${hIndex}`]) complete=false
})

if(complete){
day.classList.add("done")
}

daysDiv.appendChild(day)

})

}

render()

</script>

</body>
</html>
