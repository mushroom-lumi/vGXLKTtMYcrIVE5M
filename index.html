<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>

:root {
  --row-h: 40px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f2;
  padding: 16px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.container {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* 左侧习惯列 */

.habit-column {
  min-width: 72px;
  flex-shrink: 0;
}

.top-spacer {
  height: var(--row-h);
}

.section-title {
  height: var(--row-h);
  display: flex;
  align-items: center;
  font-weight: bold;
  font-size: 13px;
  border-bottom: 2px solid #aaa;
}

.habit {
  height: var(--row-h);
  display: flex;
  align-items: center;
  font-size: 14px;
}

/* 星期列 */

.days {
  display: flex;
  gap: 6px;
  flex: 1;
}

.day {
  background: #ddd;
  border-radius: 22px;
  padding: 6px 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.day.today {
  border: 3px solid black;
}

.day.done {
  background: black;
}

/* 星期标签行 */
.day-label-row {
  height: var(--row-h);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.day-label {
  padding: 3px 6px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 13px;
}

.day.done .day-label {
  color: white;
}

/* 占位空行（对应 section-title） */
.dot-spacer {
  height: var(--row-h);
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spacer-line {
  width: 60%;
  height: 2px;
  background: #aaa;
  opacity: 0.5;
}

.day.done .spacer-line {
  background: black;
  /* opacity: 0.4; */
}

/* 圆点行 */
.dot-row {
  height: var(--row-h);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid black;
  cursor: pointer;
  touch-action: manipulation;
  flex-shrink: 0;
}

.dot.done {
  background: black;
}

/* 黑底时，未完成圆点边框改白 */
.day.done .dot:not(.done) {
  border-color: white;
}

/* 黑底时，已完成圆点保持黑底，边框无需变化 */
.day.done .dot.done {
  background: black;
  border-color: black;
}

</style>
</head>

<body>

<h1>Habit Tracker</h1>

<div class="container">
  <div id="habits" class="habit-column"></div>
  <div id="days" class="days"></div>
</div>

<script>

const sections = [
  {
    title: "起床后",
    habits: ["穿衣服", "上厕所", "刷牙", "洗脸", "梳头"]
  },
  {
    title: "早餐后",
    habits: ["洗内裤", "消毒内裤", "收衣服", "叠衣服"]
  }
]

const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
const today = (new Date().getDay() + 6) % 7

/* 扁平化列表，null 表示分组标题占位 */
let flatList = []
sections.forEach(s => {
  flatList.push(null)           // section-title 占位
  s.habits.forEach(h => {
    flatList.push(h)
  })
})

/* 周检测 */
function weekKey() {
  const now = new Date()
  const start = new Date(now.getFullYear(), 0, 1)
  const diff = (now - start) / 86400000
  return Math.floor((diff + start.getDay() + 1) / 7)
}

let store = JSON.parse(localStorage.getItem("habitData")) || { week: null, data: {} }

if (store.week !== weekKey()) {
  store.week = weekKey()
  store.data = {}
}

let data = store.data

function save() {
  localStorage.setItem("habitData", JSON.stringify(store))
}

/* 渲染 */
function render() {

  /* 左列 */
  const habitCol = document.getElementById("habits")
  habitCol.innerHTML = ""

  /* 顶部空行，对应右侧星期标签行 */
  const topSpacer = document.createElement("div")
  topSpacer.className = "top-spacer"
  habitCol.appendChild(topSpacer)

  let sectionIndex = 0
  flatList.forEach(item => {
    if (item === null) {
      const titleDiv = document.createElement("div")
      titleDiv.className = "section-title"
      titleDiv.innerText = sections[sectionIndex].title
      sectionIndex++
      habitCol.appendChild(titleDiv)
    } else {
      const div = document.createElement("div")
      div.className = "habit"
      div.innerText = item
      habitCol.appendChild(div)
    }
  })

  /* 星期列 */
  const daysDiv = document.getElementById("days")
  daysDiv.innerHTML = ""

  dayNames.forEach((d, dayIndex) => {

    const day = document.createElement("div")
    day.className = "day"
    if (dayIndex === today) day.classList.add("today")

    /* 星期标签行 */
    const labelRow = document.createElement("div")
    labelRow.className = "day-label-row"

    const label = document.createElement("div")
    label.className = "day-label"
    label.innerText = d
    labelRow.appendChild(label)
    day.appendChild(labelRow)

    /* 遍历 flatList，null → spacer，否则 → dot */
    let habitIndex = 0
    flatList.forEach((item, flatIndex) => {
      if (item === null) {
        const spacer = document.createElement("div")
        spacer.className = "dot-spacer"
        const line = document.createElement("div")
        line.className = "spacer-line"
        spacer.appendChild(line)
        day.appendChild(spacer)
      } else {
        const dotRow = document.createElement("div")
        dotRow.className = "dot-row"

        const dot = document.createElement("div")
        dot.className = "dot"

        const key = `${dayIndex}-${habitIndex}`
        if (data[key]) dot.classList.add("done")

        dot.onclick = () => {
          data[key] = !data[key]
          save()
          render()
        }

        dotRow.appendChild(dot)
        day.appendChild(dotRow)
        habitIndex++
      }
    })

    /* 检查整列是否全部完成（只统计圆点，不含占位） */
    const totalHabits = flatList.filter(x => x !== null).length
    let complete = totalHabits > 0
    for (let i = 0; i < totalHabits; i++) {
      if (!data[`${dayIndex}-${i}`]) { complete = false; break }
    }
    if (complete) day.classList.add("done")

    daysDiv.appendChild(day)
  })
}

render()

</script>

</body>
</html>
